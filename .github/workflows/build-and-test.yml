name: Build & Test

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  Tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    # Linux runner 通过 service container 启动 PostgreSQL（macOS runner 不支持 services，静默忽略）
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wp_station_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 覆盖 config/config.toml 中的数据库连接，格式：WP_STATION_<节>__<字段>
    env:
      WP_STATION_DATABASE__HOST: localhost
      WP_STATION_DATABASE__PORT: 5432
      WP_STATION_DATABASE__NAME: wp_station_test
      WP_STATION_DATABASE__USERNAME: postgres
      WP_STATION_DATABASE__PASSWORD: postgres
      WP_STATION_DATABASE__SSL_MODE: disable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # macOS runner 上 service container 不生效，需手动安装并建库
      - name: Setup PostgreSQL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install postgresql@16
          brew services start postgresql@16
          export PATH="/opt/homebrew/opt/postgresql@16/bin:$PATH"
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 && break || sleep 1
          done
          # macOS 默认超级用户是当前系统用户，先建 postgres 角色再建库
          psql postgres -c "CREATE ROLE postgres WITH LOGIN PASSWORD 'postgres' SUPERUSER;" || true
          psql postgres -c "CREATE DATABASE wp_station_test OWNER postgres;" || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cargo build
        run: cargo build --all

      - name: Cargo test
        run: cargo test --all

      - name: Cargo fmt
        run: cargo fmt --check
