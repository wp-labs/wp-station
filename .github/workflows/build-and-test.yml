name: Build & Test

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  # Ubuntu：启动 Docker PG，执行完整测试
  test-ubuntu:
    name: Tests (ubuntu-22.04, x86_64-unknown-linux-gnu)
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: wp_station_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      WP_STATION__DATABASE__HOST: localhost
      WP_STATION__DATABASE__PORT: 5432
      WP_STATION__DATABASE__NAME: wp_station_test
      WP_STATION__DATABASE__USERNAME: postgres
      WP_STATION__DATABASE__PASSWORD: 123456
      WP_STATION__DATABASE__SSL_MODE: disable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: cd web && npm ci && npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cargo build
        run: cargo build --all

      - name: Cargo test
        run: cargo test --all

      - name: Cargo fmt
        run: cargo fmt --check

  # macOS：仅验证构建和格式，不跑测试
  build-macos:
    name: Tests (macos-14, aarch64-apple-darwin)
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: cd web && npm ci && npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cargo build
        run: cargo build --all

      - name: Cargo fmt
        run: cargo fmt --check
