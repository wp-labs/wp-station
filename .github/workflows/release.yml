name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            can-run: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            can-run: true
          - os: macos-14
            target: aarch64-apple-darwin
            can-run: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cargo build
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && '11.0' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Show version
        if: matrix.can-run == true
        run: ./target/${{ matrix.target }}/release/wp-station --version

      - name: Package artifacts
        run: |
          set -euo pipefail
          ARTIFACT="${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p artifacts
          cp -av target/${{ matrix.target }}/release/wp-station artifacts/wp-station
          tar -czf "${ARTIFACT}.tar.gz" artifacts

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  docker-build:
    needs: [build-matrix]
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download amd64 artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: docker-build/amd64-tar

      - name: Download arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          path: docker-build/arm64-tar

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

      - name: Extract binaries
        run: |
          set -euo pipefail
          cd docker-build
          
          cd amd64-tar && tar -xzf *.tar.gz && cd ..
          mkdir -p amd64
          mv amd64-tar/artifacts/* amd64/
          chmod +x amd64/*
          rm -rf amd64-tar
          
          cd arm64-tar && tar -xzf *.tar.gz && cd ..
          mkdir -p arm64
          mv arm64-tar/artifacts/* arm64/
          chmod +x arm64/*
          rm -rf arm64-tar
          
          # 复制 Dockerfile、配置和静态资源
          cp ../Dockerfile .
          mkdir -p web
          cp -r ../web/dist web/dist
          cp -r ../config .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            # type=semver,pattern=${{ github.ref_name }}
            # type=semver,pattern=v{{major}}.{{minor}}
            # type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: docker-build
          file: docker-build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  docker-images-export:
    needs: [docker-build]
    name: Export Docker Images ${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            docker_platform: linux/amd64
            artifact_arch: x86-linux-gnu
          - os: ubuntu-24.04-arm
            docker_platform: linux/arm64
            artifact_arch: aarch64-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve compose files
        id: compose
        run: |
          set -euo pipefail

          if [[ "${{ github.ref_name }}" == *-alpha* ]]; then
            echo "compose_file=dev-ops/docker/docker-compose-alpha.yml" >> "$GITHUB_OUTPUT"
            echo "env_file=dev-ops/docker/.env.alpha" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == *-beta* ]]; then
            echo "compose_file=dev-ops/docker/docker-compose-beta.yml" >> "$GITHUB_OUTPUT"
            echo "env_file=dev-ops/docker/.env.beta" >> "$GITHUB_OUTPUT"
          else
            echo "compose_file=dev-ops/docker/docker-compose.yml" >> "$GITHUB_OUTPUT"
            echo "env_file=dev-ops/docker/.env" >> "$GITHUB_OUTPUT"
          fi

      - name: Export compose images
        run: |
          set -euo pipefail

          OVERRIDE_FILE="$(mktemp)"
          trap 'rm -f "$OVERRIDE_FILE"' EXIT

          printf '%s\n' \
            'services:' \
            '  warp-station:' \
            '    image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}' \
            > "$OVERRIDE_FILE"

          mapfile -t IMAGES < <(
            docker compose \
              --env-file "${{ steps.compose.outputs.env_file }}" \
              -f "${{ steps.compose.outputs.compose_file }}" \
              -f "$OVERRIDE_FILE" \
              config --images | sort -u
          )

          if [ "${#IMAGES[@]}" -eq 0 ]; then
            echo "未解析到任何镜像" >&2
            exit 1
          fi

          for image in "${IMAGES[@]}"; do
            docker pull --platform "${{ matrix.docker_platform }}" "$image"
          done

          OUTPUT_FILE="wp-station-${{ github.ref_name }}-docker-images-${{ matrix.artifact_arch }}.tar.gz"
          docker save "${IMAGES[@]}" | gzip -c > "$OUTPUT_FILE"

      - name: Upload docker images artifact
        uses: actions/upload-artifact@v6
        with:
          name: wp-station-${{ github.ref_name }}-docker-images-${{ matrix.artifact_arch }}
          path: wp-station-${{ github.ref_name }}-docker-images-${{ matrix.artifact_arch }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [build-matrix, docker-build, docker-images-export]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract changelog
        id: changelog
        run: |
          if [ -f scripts/extract-changelog.sh ]; then
            bash scripts/extract-changelog.sh ${{ github.ref_name }}
          else
            echo "未找到 scripts/extract-changelog.sh，使用默认发布说明。" >&2
            printf "Release %s\n" "${{ github.ref_name }}" > /tmp/changelog-zh.md
            printf "Release %s\n" "${{ github.ref_name }}" > /tmp/changelog-en.md
          fi

          # Read the extracted changelogs
          CHANGELOG_ZH=$(cat /tmp/changelog-zh.md)
          CHANGELOG_EN=$(cat /tmp/changelog-en.md)

          # Save to output (escape for multiline)
          echo "changelog_zh<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_ZH" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changelog_en<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_EN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: ${{ github.event.repository.name }}-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: |
            # wp-station ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog_en }}

            ---

            <details>
            <summary>中文版 Changelog / Chinese Version</summary>

            ${{ steps.changelog.outputs.changelog_zh }}

            </details>

            ---

            ## 📦 安装方式 / Installation

            ### 二进制文件下载 / Binary Downloads
            从下方 Assets 中下载适合您平台的预编译二进制文件。

            Download the pre-built binaries for your platform from the assets below.

            **支持的平台 / Supported Platforms:**
            - Linux x86_64 (AMD64)
            - Linux aarch64 (ARM64)
            - macOS aarch64 (Apple Silicon)

            ### Docker 镜像 / Docker Image
            拉取并运行 Docker 镜像 / Pull and run the Docker image:

            ```shell
            # 拉取指定版本 / Pull the specific version
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # 或拉取最新版本 / Or pull the latest version
            docker pull ghcr.io/${{ github.repository }}:latest

            # 运行容器 / Run the container
            docker run -d -p 8081:8081 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            # 访问 / Access at: http://localhost:8081
            ```

            ## 🔐 签名验证 / Verification
            所有构建产物都使用 Sigstore 进行签名。您可以使用 GitHub CLI 验证签名:

            All artifacts are signed with this repo's identity using Sigstore. You can verify the signatures using the GitHub CLI:

            ```shell
            gh attestation verify --owner ${{ github.repository_owner }} <artifact-file>
            ```
            
            ## 🐛 发现问题? / Found an Issue?
            请在此报告 / Please report it at: https://github.com/${{ github.repository }}/issues
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          files: artifacts/*

  deploy:
    needs: [docker-images-export]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      WORK_DIR: ${{ vars.WORK_DIR }}
      HOST_IP: ${{ secrets.HOST_IP }}
      HOST_USER: ${{ secrets.HOST_USER }}
      HOST_SSH: ${{ secrets.HOST_SSH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve deploy target
        id: deploy_target
        run: |
          set -euo pipefail

          if [[ "${{ github.ref_name }}" == *-alpha* ]]; then
            echo "channel=alpha" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose-alpha.yml" >> "$GITHUB_OUTPUT"
            echo "env_file=.env.alpha" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == *-beta* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose-beta.yml" >> "$GITHUB_OUTPUT"
            echo "env_file=.env.beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose.yml" >> "$GITHUB_OUTPUT"
            echo "env_file=.env" >> "$GITHUB_OUTPUT"
          fi

          echo "remote_stage=${WORK_DIR}/.deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        run: |
          set -euo pipefail
          echo "::add-mask::$HOST_SSH"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HOST_SSH" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST_IP" >> ~/.ssh/known_hosts

      - name: Detect remote architecture
        id: remote_arch
        run: |
          set -euo pipefail

          remote_arch=$(ssh -i ~/.ssh/id_ed25519 "$HOST_USER@$HOST_IP" 'uname -m')
          case "$remote_arch" in
            x86_64|amd64)
              echo "artifact_arch=x86-linux-gnu" >> "$GITHUB_OUTPUT"
              ;;
            aarch64|arm64)
              echo "artifact_arch=aarch64-linux-gnu" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "不支持的远程机器架构: $remote_arch" >&2
              exit 1
              ;;
          esac

      - name: Download docker images artifact
        uses: actions/download-artifact@v7
        with:
          name: wp-station-${{ github.ref_name }}-docker-images-${{ steps.remote_arch.outputs.artifact_arch }}
          path: deploy-artifacts/images

      - name: Prepare deploy bundle
        id: bundle
        run: |
          set -euo pipefail

          DEPLOY_ROOT="deploy-bundle"
          CONFIG_ARCHIVE="wp-station-${{ github.ref_name }}-${{ steps.deploy_target.outputs.channel }}-docker-config.tar.gz"
          IMAGE_ARCHIVE="wp-station-${{ github.ref_name }}-docker-images-${{ steps.remote_arch.outputs.artifact_arch }}.tar.gz"

          rm -rf "$DEPLOY_ROOT"
          mkdir -p "$DEPLOY_ROOT"
          cp -a dev-ops/docker/. "$DEPLOY_ROOT/"

          sed -i "s|ghcr.io/wp-labs/wp-station:latest|${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}|g" \
            "$DEPLOY_ROOT/${{ steps.deploy_target.outputs.compose_file }}"

          tar -C "$DEPLOY_ROOT" -czf "$CONFIG_ARCHIVE" .

          echo "config_archive=$CONFIG_ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "image_archive=$IMAGE_ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Create remote staging directory
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "$HOST_USER@$HOST_IP" \
            "mkdir -p '${{ steps.deploy_target.outputs.remote_stage }}' '${WORK_DIR}/${{ steps.deploy_target.outputs.channel }}'"

      - name: Upload deploy assets
        run: |
          set -euo pipefail

          scp -i ~/.ssh/id_ed25519 \
            "deploy-artifacts/images/${{ steps.bundle.outputs.image_archive }}" \
            "${{ steps.bundle.outputs.config_archive }}" \
            "$HOST_USER@$HOST_IP:'${{ steps.deploy_target.outputs.remote_stage }}/'"

      - name: Deploy remotely
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 "$HOST_USER@$HOST_IP" \
            bash -s -- \
            "$WORK_DIR" \
            "${{ steps.deploy_target.outputs.channel }}" \
            "${{ steps.deploy_target.outputs.compose_file }}" \
            "${{ steps.deploy_target.outputs.env_file }}" \
            "${{ steps.bundle.outputs.image_archive }}" \
            "${{ steps.bundle.outputs.config_archive }}" \
            "${{ steps.deploy_target.outputs.remote_stage }}" <<'EOF'
          set -euo pipefail

          WORK_DIR="$1"
          CHANNEL="$2"
          COMPOSE_FILE="$3"
          ENV_FILE="$4"
          IMAGE_ARCHIVE="$5"
          CONFIG_ARCHIVE="$6"
          REMOTE_STAGE="$7"
          TARGET_DIR="${WORK_DIR}/${CHANNEL}"

          docker load -i "${REMOTE_STAGE}/${IMAGE_ARCHIVE}"
          rm -f "${REMOTE_STAGE}/${IMAGE_ARCHIVE}"

          if [ -f "${TARGET_DIR}/${COMPOSE_FILE}" ] && [ -f "${TARGET_DIR}/${ENV_FILE}" ]; then
            docker compose \
              --env-file "${TARGET_DIR}/${ENV_FILE}" \
              -f "${TARGET_DIR}/${COMPOSE_FILE}" \
              stop warp-station || true
          fi

          mkdir -p "$TARGET_DIR"
          shopt -s dotglob nullglob
          rm -rf -- "$TARGET_DIR"/*
          tar -xzf "${REMOTE_STAGE}/${CONFIG_ARCHIVE}" -C "$TARGET_DIR"
          rm -rf "$REMOTE_STAGE"

          docker compose \
            --env-file "${TARGET_DIR}/${ENV_FILE}" \
            -f "${TARGET_DIR}/${COMPOSE_FILE}" \
            up -d warp-station
          EOF
