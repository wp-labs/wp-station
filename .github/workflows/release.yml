name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            can-run: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            can-run: true
          - os: macos-14
            target: aarch64-apple-darwin
            can-run: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cargo build
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && '11.0' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Show version
        if: matrix.can-run == true
        run: ./target/${{ matrix.target }}/release/wp-station --version

      - name: Package artifacts
        run: |
          set -euo pipefail
          ARTIFACT="${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p artifacts
          cp -av target/${{ matrix.target }}/release/wp-station artifacts/wp-station
          tar -czf "${ARTIFACT}.tar.gz" artifacts

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  docker-build:
    needs: [build-matrix]
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download amd64 artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: docker-build/amd64-tar

      - name: Download arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          path: docker-build/arm64-tar

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend assets
        run: |
          cd web
          npm ci
          npm run build

      - name: Extract binaries
        run: |
          set -euo pipefail
          cd docker-build
          
          cd amd64-tar && tar -xzf *.tar.gz && cd ..
          mkdir -p amd64
          mv amd64-tar/artifacts/* amd64/
          chmod +x amd64/*
          rm -rf amd64-tar
          
          cd arm64-tar && tar -xzf *.tar.gz && cd ..
          mkdir -p arm64
          mv arm64-tar/artifacts/* arm64/
          chmod +x arm64/*
          rm -rf arm64-tar
          
          # 复制 Dockerfile、配置和静态资源
          cp ../Dockerfile .
          mkdir -p web
          cp -r ../web/dist web/dist
          cp -r ../config .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: docker-build
          file: docker-build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    needs: [build-matrix, docker-build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract changelog
        id: changelog
        run: |
          if [ -f scripts/extract-changelog.sh ]; then
            bash scripts/extract-changelog.sh ${{ github.ref_name }}
          else
            echo "未找到 scripts/extract-changelog.sh，使用默认发布说明。" >&2
            printf "Release %s\n" "${{ github.ref_name }}" > /tmp/changelog-zh.md
            printf "Release %s\n" "${{ github.ref_name }}" > /tmp/changelog-en.md
          fi

          # Read the extracted changelogs
          CHANGELOG_ZH=$(cat /tmp/changelog-zh.md)
          CHANGELOG_EN=$(cat /tmp/changelog-en.md)

          # Save to output (escape for multiline)
          echo "changelog_zh<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_ZH" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changelog_en<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_EN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: ${{ github.event.repository.name }}-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: |
            # wp-station ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog_en }}

            ---

            <details>
            <summary>中文版 Changelog / Chinese Version</summary>

            ${{ steps.changelog.outputs.changelog_zh }}

            </details>

            ---

            ## 📦 安装方式 / Installation

            ### 二进制文件下载 / Binary Downloads
            从下方 Assets 中下载适合您平台的预编译二进制文件。

            Download the pre-built binaries for your platform from the assets below.

            **支持的平台 / Supported Platforms:**
            - Linux x86_64 (AMD64)
            - Linux aarch64 (ARM64)
            - macOS aarch64 (Apple Silicon)

            ### Docker 镜像 / Docker Image
            拉取并运行 Docker 镜像 / Pull and run the Docker image:

            ```shell
            # 拉取指定版本 / Pull the specific version
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # 或拉取最新版本 / Or pull the latest version
            docker pull ghcr.io/${{ github.repository }}:latest

            # 运行容器 / Run the container
            docker run -d -p 18080:8081 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            # 访问 / Access at: http://localhost:18080
            ```

            ## 🔐 签名验证 / Verification
            所有构建产物都使用 Sigstore 进行签名。您可以使用 GitHub CLI 验证签名:

            All artifacts are signed with this repo's identity using Sigstore. You can verify the signatures using the GitHub CLI:

            ```shell
            gh attestation verify --owner ${{ github.repository_owner }} <artifact-file>
            ```
            
            ## 🐛 发现问题? / Found an Issue?
            请在此报告 / Please report it at: https://github.com/${{ github.repository }}/issues
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          files: artifacts/*
